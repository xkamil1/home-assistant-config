- id: assist_tts_soundbar
  alias: Assist TTS na soundbar
  description: Po odpovedi asistenta prehraj TTS na soundbar
  triggers:
    - trigger: state
      entity_id: assist_satellite.viocepe_assist_satellite
      from: responding
      to: idle
  actions:
    - action: tts.speak
      target:
        entity_id: tts.google_cloud
      data:
        media_player_entity_id: media_player.q_series_soundbar_2
        message: "{{ state_attr('conversation.claude_conversation', 'last_response') }}"
        options:
          voice: cs-CZ-Chirp3-HD-Aoede
  mode: single
