- id: voicepe_duck_on_wake
  alias: VoicePE ztlum radio pri poslechu
  description: Po wake wordu ztlum soundbar, po odpovedi vrat zpet
  triggers:
    - trigger: state
      entity_id: assist_satellite.viocepe_assist_satellite
      from: idle
  actions:
    - variables:
        prev_volume: "{{ state_attr('media_player.q_series_soundbar_2', 'volume_level') | float(0.10) }}"
        was_playing: "{{ states('media_player.q_series_soundbar_2') }}"
        prev_content: "{{ state_attr('media_player.q_series_soundbar_2', 'media_content_id') }}"
    - action: media_player.volume_set
      target:
        entity_id: media_player.q_series_soundbar_2
      data:
        volume_level: 0
    - wait_for_trigger:
        - trigger: state
          entity_id: assist_satellite.viocepe_assist_satellite
          to: idle
      timeout: "00:00:45"
    - delay:
        seconds: 12
    - action: media_player.volume_set
      target:
        entity_id: media_player.q_series_soundbar_2
      data:
        volume_level: "{{ prev_volume }}"
