type: vertical-stack
cards:

  # ── Hlavicka ──────────────────────────────────────────────────────────────
  - type: markdown
    content: >
      {% set stav = states('sensor.boiler_surplus_status') %}
      {% if stav == 'Nabiji' %}
        <ha-icon icon="mdi:fire" style="color: green; font-size: 28px;"></ha-icon>
        <span style="font-size: 20px; font-weight: bold; color: green;"> Spirála bojleru — NABÍJÍ</span>
      {% elif stav == 'Blokovano_teplota' %}
        <ha-icon icon="mdi:thermometer-check" style="color: #2196F3; font-size: 28px;"></ha-icon>
        <span style="font-size: 20px; font-weight: bold; color: #2196F3;"> Spirála bojleru — PLNÝ</span>
      {% elif stav == 'Mimo_cas' %}
        <ha-icon icon="mdi:clock-outline" style="color: orange; font-size: 28px;"></ha-icon>
        <span style="font-size: 20px; font-weight: bold; color: orange;"> Spirála bojleru — MIMO ČAS</span>
      {% elif stav == 'Chyba_senzoru' %}
        <ha-icon icon="mdi:alert" style="color: red; font-size: 28px;"></ha-icon>
        <span style="font-size: 20px; font-weight: bold; color: red;"> Spirála bojleru — CHYBA SENZORU</span>
      {% else %}
        <ha-icon icon="mdi:fire-off" style="color: gray; font-size: 28px;"></ha-icon>
        <span style="font-size: 20px; font-weight: bold; color: gray;"> Spirála bojleru — ČEKÁ</span>
      {% endif %}

  # ── Aktualni hodnoty ──────────────────────────────────────────────────────
  - type: entities
    title: Aktuální hodnoty
    entities:
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: phase_b_power
        name: Fáze B (W)
        icon: mdi:transmission-tower
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: teplota
        name: Teplota bojleru (°C)
        icon: mdi:thermometer-water
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: spirala
        name: Spirála
        icon: mdi:fire

  # ── Posledni akce ─────────────────────────────────────────────────────────
  - type: entities
    title: Poslední akce
    entities:
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: last_action
        name: Akce
        icon: mdi:history
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: last_action_time
        name: Čas akce
        icon: mdi:clock-outline
      - type: attribute
        entity: sensor.boiler_surplus_status
        attribute: dnes_celkem_minut
        name: Dnes běžela (min)
        icon: mdi:timer-outline

  # ── Log ───────────────────────────────────────────────────────────────────
  - type: markdown
    title: Log posledních akcí
    content: >
      {% set log = state_attr('sensor.boiler_surplus_status', 'log') %}
      {% if log and log | length > 0 %}
        {% for entry in log %}
      - {{ entry }}
        {% endfor %}
      {% else %}
      _Zatím žádné akce._
      {% endif %}
