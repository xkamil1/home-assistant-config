# Faktury - REST senzory z invoice app (10.0.0.55)
rest:
  - resource: http://10.0.0.55:8000/api/invoices/ha/unpaid
    scan_interval: 3600
    timeout: 30
    sensor:
      - name: "Neuhrazene faktury"
        unique_id: neuhrazene_faktury
        value_template: "{{ value_json.count }}"
        icon: mdi:file-document-alert
      - name: "Faktury k uhrade celkem"
        unique_id: faktury_k_uhrade_celkem
        value_template: "{{ value_json.total_amount }}"
        unit_of_measurement: "CZK"
        icon: mdi:cash
      - name: "Faktury po splatnosti"
        unique_id: faktury_po_splatnosti
        value_template: "{{ value_json.invoices | selectattr('overdue', 'true') | list | length }}"
        icon: mdi:alert
      - name: "Faktury detail"
        unique_id: faktury_detail
        value_template: "{{ value_json.count }}"
        json_attributes:
          - invoices
          - total_amount
  - resource: http://10.0.0.55:8000/api/invoices/ha/due-soon?days=2
    scan_interval: 3600
    timeout: 30
    sensor:
      - name: "Faktury pred splatnosti"
        unique_id: faktury_pred_splatnosti
        value_template: "{{ value_json.count }}"
        icon: mdi:clock-alert
        json_attributes:
          - invoices

