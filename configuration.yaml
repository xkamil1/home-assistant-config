# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes


automation: !include_dir_merge_list automations/
script: !include scripts.yaml
scene: !include scenes.yaml
template:
  # Cooling and heating lock
  - binary_sensor:
      - name: "Cooling Lock Active Nela"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.cooling_lockout_until_nela') | as_datetime) }}
      - name: "Heating Lock Active Nela"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.heating_lockout_until_nela') | as_datetime) }}
      - name: "Cooling Lock Active Adela"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.cooling_lockout_until_adela') | as_datetime) }}
      - name: "Heating Lock Active Adela"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.heating_lockout_until_adela') | as_datetime) }}
  # AC and heating override indikatory
  - binary_sensor:  
      - name: "Nela AC Override Active"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.nela_ac_override_until') | as_datetime) }}

      - name: "Adela AC Override Active"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.adela_ac_override_until') | as_datetime) }}

      - name: "Nela Heat Override Active"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.nela_heat_override_until') | as_datetime) }}

      - name: "Adela Heat Override Active"
        state: >
          {{ now().replace(tzinfo=None) < (states('input_datetime.adela_heat_override_until') | as_datetime) }}
  # Sensor pro „poslední způsob aktivace“ AC u Nely - manual vs automation            
      - name: "HDO - Nizky tarif (NT)"
        unique_id: hdo_nizky_tarif
        device_class: power
        icon: "mdi:flash"
        state: >
          {% set t = now().hour * 60 + now().minute %}
          {{ t < 480 or (t >= 540 and t < 720) or
             (t >= 780 and t < 900) or (t >= 960 and t < 1140) or
             t >= 1200 }}
        attributes:
          tarif: >
            {% set t = now().hour * 60 + now().minute %}
            {% if t < 480 or (t >= 540 and t < 720) or (t >= 780 and t < 900) or (t >= 960 and t < 1140) or t >= 1200 %}NT{% else %}VT{% endif %}
          kod: "PTV3"
          distribuce: "CEZ"
  - sensor:
      - name: "Teplota obyvak prumer"
        unique_id: teplota_obyvak_prumer
        device_class: temperature
        unit_of_measurement: "C"
        state: >
          {% set t2 = states('sensor.obyvak2_temperature') | float(0) %}
          {% set t3 = states('sensor.teplota_obyvak3_temperature') | float(0) %}
          {% set vals = [t2, t3] | select('gt', 0) | list %}
          {% if vals | length > 0 %}
            {{ (vals | sum / vals | length) | round(2) }}
          {% else %}
            unavailable
          {% endif %}

  - sensor:
      - name: "nela_ac_last_trigger"
        state: >
          {% set ctx = states.climate.nela_pokoj_room_temperature.context %}
          {% if ctx.user_id %}
            manual
          {% else %}
            automation
          {% endif %}
  # Sensor pro „poslední způsob aktivace“ AC u Adely - manual vs automation                      
  - sensor:  
      - name: "adela_ac_last_trigger"
        state: >
          {% set ctx = states.climate.adela_pokoj_room_temperature.context %}
          {% if ctx.user_id %}
            manual
          {% else %}
            automation 
          {% endif %} 
  # Sensor pro „poslední způsob aktivace“ topení u Nely - manual vs automation
      - name: "nela_heat_last_trigger"
        state: >
          {% set ctx = states.climate.nela_pokoj_room_temperature.context %}
          {% if ctx.user_id %}
            manual
          {% else %}
            automation
          {% endif %}
  # Sensor pro „poslední způsob aktivace“ topeni u Adely - manual vs automation
      - name: "adela_heat_last_trigger"
        state: >
          {% set ctx = states.climate.adela_pokoj_room_temperature.context %}
          {% if ctx.user_id %}
            manual
          {% else %}
            automation
          {% endif %}      
  #součet spotřebované energie tepelným čerpadlem
  - sensor:
      - name: "Shelly 3EM Total Energy"
        unique_id: shelly_3em_total_energy
        unit_of_measurement: "kWh"
        state_class: total_increasing
        device_class: energy
        state: >
          {% set a = states('sensor.shellyem3_34945475ecce_channel_a_energy') | float(0) %}
          {% set b = states('sensor.shellyem3_34945475ecce_channel_b_energy') | float(0) %}
          {% set c = states('sensor.shellyem3_34945475ecce_channel_c_energy') | float(0) %}
          {% set total = a + b + c %}
          {% set last = states('sensor.shelly_3em_total_energy') | float(0) %}
          {% set max_increase = 10 %}

          {% if a == 0 or b == 0 or c == 0 %}
            {# Pokud některý senzor vrací nulu (výpadek), použij poslední hodnotu #}
          {{ last }}
          {% elif total < last %}
            {# Přetečení čítače nebo obnovení po výpadku #}
          {{ last }}
          {% elif total - last > max_increase and last > 0 %}
            {# Pokud je nárůst větší než povolený limit, ale nejde o první hodnotu po výpadku #}
          {{ last }}
          {% else %}
            {# Normální stav: hodnotu aktualizuj #}
          {{ total }}
          {% endif %}

  #Okamžitá spotřeba TC
  - sensor:
      - name: "Shelly 3EM Okamzita Spotreba"
        unique_id: shelly_3em_instant_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: >
          {{
            states('sensor.shellyem3_34945475ecce_channel_a_power') | float(0) +
            states('sensor.shellyem3_34945475ecce_channel_b_power') | float(0) +
            states('sensor.shellyem3_34945475ecce_channel_c_power') | float(0)
          }}
  #Sběr dat o stavu switche tepelnecerpadlo_topeni
  - sensor:
      - name: "TČ topení aktivní"
        unique_id: tc_topeni_aktivni
        state: >
          {% if is_state('switch.tepelnecerpadlo_topeni', 'on') %}
            1
          {% else %}
            0
          {% endif %}
        device_class: power
        unit_of_measurement: ""
  #Sběr dat o stavu switche switch.spinac_bazen2
  - sensor:
      - name: "bazen_aktivni"
        unique_id: bazen_aktivni
        state: >
          {{ 1 if is_state('switch.spinac_bazen2', 'on') else 0 }}
        device_class: power
        unit_of_measurement: ""
#Sběr dat o stavu switch.tepelnecerpadlo_bojler
  - sensor:
      - name: "bojler_aktivni"
        unique_id: bojler_aktivni
        state: >
          {{ 1 if is_state('switch.tepelnecerpadlo_bojler', 'on') else 0 }}
        device_class: power
        unit_of_measurement: ""
#zjištění, zda je přetok nebo spotřeba



  ####Sensors pro zobrazeni v tabulce
  - sensor:
      - name: "Adam pokoj teplota a vlhkost"
        state: >
          {{ states('sensor.teplota_adam_pokoj_temperature_2') }}°C / {{ states('sensor.teplota_adam_pokoj_humidity_2') }}%
      - name: "Adela pokoj teplota a vlhkost"
        state: >
          {{ states('sensor.teplota_adela_pokoj_temperature_3') }}°C / {{ states('sensor.teplota_adela_pokoj_humidity_3') }}%
      - name: "Nela pokoj teplota a vlhkost"
        state: >
          {{ states('sensor.teplota_nela_pokoj_temperature_4') }}°C / {{ states('sensor.teplota_nela_pokoj_humidity_4') }}%
      - name: "Nela pokoj teplota a vlhkost"
        state: >
          {{ states('sensor.teplota_koupelna_temperature') }}°C / {{ states('sensor.teplota_koupelna_humidity') }}%
  #Délka zapnutí tepelného čerpadla
  #Počet zapnutí tepelného čerpadla
  - trigger:
      - platform: state
        entity_id: switch.tepelnecerpadlo_topeni
        from: "off"
        to: "on"
    sensor:
      - name: heatpump_start_count
        unique_id: heatpump_start_count
        state: >
          {% set current = states('sensor.heatpump_start_count') | int(0) %}
          {{ current + 1 }}
        unit_of_measurement: "x"
        state_class: total_increasing




sensor:
  - platform: time_date
    display_options:
      - "time"

  - platform: template
    sensors:
      solar_power:
        friendly_name: "Solar Power"
        unit_of_measurement: "W"
        value_template: "{{ states('sensor.inverter_active_power') | float }}"

  - platform: integration
    source: sensor.inverter_active_power
    name: solar_energy
    unit_prefix: k
    round: 2

  - platform: history_stats
    name: Tepelne cerpadlo cas v provozu
    entity_id: switch.tepelnecerpadlo_topeni
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0) }}"
    end: "{{ now() }}"

