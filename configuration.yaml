climate:
  - platform: generic_thermostat
    name: Topeni
    heater: switch.tepelnecerpadlo_topeni
    target_sensor: sensor.teplota_obyvak_prumer
    min_temp: 15
    max_temp: 30
    ac_mode: false
#tuto teplotu je na zimu nutno změnit na 21    
    target_temp: 21
    cold_tolerance: 0.2
    hot_tolerance: 0.3
    keep_alive:
      minutes: 5
    initial_hvac_mode: "heat"
#tuto teplotu je na zimu nutno změnit na 19
    away_temp: 19
