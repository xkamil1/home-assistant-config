
  ohrev_vody_switch:
    alias: Ovládání ohřevu vody
    sequence:
      - service: switch.turn_{{ states('input_boolean.ohrev_vody_switch') | lower }}
        entity_id:
          - switch.tepelnecerpadlo_zapnouttc
          - switch.tepelnecerpadlo_3w_teplavoda
  play_radio:
    alias: Pustit radio
    description: Pustit radiostanici na soundbar
    fields:
      url:
        description: URL streamu radiostanice
        required: true
        example: https://rozhlas.stream/radiozurnal_mp3_128.mp3
    sequence:
      - service: media_player.turn_on
        target:
          entity_id: media_player.q_series_soundbar_2
      - delay:
          seconds: 2
      - service: media_player.play_media
        target:
          entity_id: media_player.q_series_soundbar_2
        data:
          media_content_id: "{{ url }}"
          media_content_type: music
